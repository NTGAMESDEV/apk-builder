<!DOCTYPE html>
<html>
<head>
  <title>APK Builder</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🚀 APK Builder</h1>

<input type="file" id="fileInput" webkitdirectory multiple />
<button onclick="upload()">Upload</button>

<hr>

<button onclick="showEdit()">⚙️ แก้ไข</button>
<button onclick="buildAPK()">🔥 Build APK</button>

<a id="downloadBtn" style="display:none;" download>
  <button>⬇️ Download APK</button>
</a>

<div id="editBox" style="display:none;">
  <h3>แก้ไขข้อมูล</h3>

  <input id="appName" placeholder="ชื่อ APK"><br>
  <input id="package" placeholder="Package"><br>
  <input id="ip" placeholder="IP"><br>
  <input id="port" placeholder="Port"><br>
  <input id="api" placeholder="API"><br>

  <button onclick="saveConfig()">💾 บันทึก</button>
</div>

<script src="script.js"></script>
</body>
</html>
